set -g prefix C-a                          # prefix key

set -g default-terminal "tmux-256color"    # terminal type
set-option -sa terminal-overrides ',xterm-ghostty:RGB'

set -g base-index 1                        # set initial window index to 1
set -sg escape-time 0                      # escape time
set -g mouse on                            # enable mouse
setw -g mode-keys vi                       # enable vi mode keys

# Move between panes with vi keys
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

set-option -g focus-events on

set -g status-interval 2
set -g status-right-length 60

# Minimal status bar — adapts to Ghostty's light/dark theme
set -g status-style "bg=terminal,fg=colour7"
set -g status-left "#S "
set -g status-right "#(tmux-mem-cpu-load) "
setw -g window-status-format " #I:#W "
setw -g window-status-current-format " #[bold]#I:#W#[nobold] "
set -g pane-border-style "fg=colour7"
set -g pane-active-border-style "fg=colour8"
set -g message-style "bg=terminal,fg=terminal"
